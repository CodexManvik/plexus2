<!DOCTYPE html><html lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>LexIntel | Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "outline": "#74777d",
                        "tertiary-fixed": "#feddb5",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d8dadc",
                        "surface-tint": "#4f6073",
                        "on-secondary-fixed-variant": "#38485d",
                        "inverse-primary": "#b7c8de",
                        "on-surface-variant": "#44474c",
                        "primary-container": "#1a2b3c",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#38485a",
                        "surface-bright": "#f7f9fb",
                        "on-tertiary-fixed": "#281802",
                        "surface-container-high": "#e6e8ea",
                        "secondary-container": "#d0e1fb",
                        "inverse-surface": "#2d3133",
                        "on-primary-container": "#8192a7",
                        "tertiary-container": "#38260b",
                        "on-primary-fixed": "#0b1d2d",
                        "surface": "#f7f9fb",
                        "secondary-fixed-dim": "#b7c8e1",
                        "tertiary-fixed-dim": "#e1c29b",
                        "on-tertiary-fixed-variant": "#584326",
                        "on-tertiary-container": "#a88c69",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e0e3e5",
                        "primary": "#041627",
                        "outline-variant": "#c4c6cd",
                        "on-background": "#191c1e",
                        "secondary": "#505f76",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#0b1c30",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#b7c8de",
                        "surface-container-low": "#f2f4f6",
                        "surface-container": "#eceef0",
                        "secondary-fixed": "#d3e4fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "xl": "32px",
                        "sm": "8px",
                        "sidebar-width": "240px",
                        "gutter": "12px",
                        "lg": "24px",
                        "md": "16px",
                        "metadata-panel": "320px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],

                        "display-sm": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],

            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .login-mesh {
            background-color: #f7f9fb;
            background-image: 
                radial-gradient(at 0% 0%, rgba(210, 228, 251, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(210, 228, 251, 0.2) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-md bg-surface-container-low">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col gap-lg">
<!-- Branding Section -->
<header class="flex flex-col items-center text-center gap-sm">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: &quot;FILL&quot; 1;">gavel</span>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tighter">ContractLens</h1>
</div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Enterprise Contract Intelligence</p>
</header>
<!-- Form Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-lg p-xl shadow-sm">
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-primary mb-xs">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your credentials to access the legal repository.</p>
</div>
<form action="#" class="space-y-md" onsubmit="event.preventDefault();">
<!-- Role Selection -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-xs" for="role">
<span class="material-symbols-outlined text-[16px]">account_tree</span>
                        SYSTEM ROLE
                    </label>
<div class="relative">
<select class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary text-body-md font-body-md py-sm px-md appearance-none transition-all outline-none" id="role">
<option value="admin">Admin</option>
<option value="operation_user">Operation User</option>
<option value="operation_head">Operation Head</option>
</select>
<div class="absolute right-md top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<!-- Username -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-xs" for="username">
<span class="material-symbols-outlined text-[16px]">person</span>
                        USERNAME
                    </label>
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary text-body-md font-body-md py-sm px-md transition-all outline-none placeholder:text-outline" id="username" placeholder="e.g. j.doe@firm.com" type="text">
</div>
<!-- Password -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-xs" for="password">
<span class="material-symbols-outlined text-[16px]">lock</span>
                            PASSWORD
                        </label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary text-body-md font-body-md py-sm px-md transition-all outline-none placeholder:text-outline" id="password" placeholder="••••••••" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-sm pt-xs">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary-container" id="remember" type="checkbox">
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-md rounded-lg hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-lg" type="submit">
<span class="">SECURE ACCESS</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
</section>
<!-- Footer / Trust Badges -->
<footer class="flex flex-col items-center gap-md">
<div class="flex items-center gap-lg opacity-60">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-label-md text-[10px]">SOC2 COMPLIANT</span>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">encrypted</span>
<span class="font-label-md text-[10px]">AES-256 ENCRYPTION</span>
</div>
</div>
<nav class="flex gap-md">
<a class="font-label-md text-[11px] text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-md text-[11px] text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-md text-[11px] text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
</nav>
</footer>
</main>
<!-- Side Decoration / Brand Image -->

<script>
        // Micro-interaction for password visibility
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('#password');
        
        toggleBtn.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            toggleBtn.children[0].textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Simple input focus effects
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('scale-[1.01]');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>


</body></html>
