                                        </thead>
                                        <tbody className="divide-y">
                                            {[
                                                { h: 'Liability Cap', l: 'P1 + P4 + P9', c: 'High' },
                                                { h: 'Notice Period', l: 'P2 + P3', c: 'Med' },
                                                { h: 'Governing Law', l: 'P11', c: 'High' }
                                            ].map((row, i) => (
                                                <tr key={i} className="hover:bg-surface-container-low transition-colors">
                                                    <td className="px-lg py-md font-bold text-primary">{row.h}</td>
                                                    <td className="px-lg py-md"><span className="font-mono-md bg-surface-container px-sm rounded">{row.l}</span></td>
                                                    <td className="px-lg py-md"><span className="text-label-md font-bold px-2 py-1 rounded bg-error-container/30 text-on-error-container">{row.c}</span></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // --- App Entry Point ---

        const App = () => {
            return (
                <MemoryRouter>
                    <Routes>
                        <Route path="/" element={<LoginScreen />} />
                        <Route path="/dashboard" element={<DashboardScreen />} />
                        <Route path="/extraction" element={<ExtractionScreen />} />
                        <Route path="/upload" element={<UploadScreen />} />
                        <Route path="/verify" element={<VerificationScreen />} />
                        <Route path="/approvals" element={<ApprovalQueueScreen />} />
                        <Route path="/repository" element={<RepositoryScreen />} />
                        <Route path="/master-maintenance" element={<MasterMaintenanceScreen />} />
                    </Routes>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
